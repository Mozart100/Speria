version: "3.9"

services:
  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/api/diagnostics/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: giphy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    networks:
      - app-network

  server:
    build:
      context: ./server
    container_name: giphy-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      GIPHY_API_KEY: "zpNucV44EYMX7KI2bShFsx08ANrHqRK1"
      GIPHY_BASE_URL: "https://api.giphy.com"
      SEQ_URL: "http://seq:80"
      REDIS_CONNECTION_STRING: "redis:6379"
      CACHE_TTL_MINUTES: "60"
      GIPHY_RESULT_LIMIT: "50"
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  client:
    build:
      context: ./client
    container_name: giphy-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      # Empty → browser fetch uses relative /api/... paths that Next.js rewrites to the server.
      NEXT_PUBLIC_API_BASE_URL: ""
      # Server-side only — consumed by next.config.ts rewrites, never sent to the browser.
      API_BASE_URL: "http://server:8080"
    ports:
      - "3000:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
